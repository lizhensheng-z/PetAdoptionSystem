# MyBatis-Plus代码生成器配置文件
# 数据库配置
jdbc.url=jdbc:mysql://localhost:3306/petAdoptionSystem?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
jdbc.username=root
jdbc.password=root

# 包配置
parent.package=com.yr.pet.adoption
module.name=

# 作者信息
author=宗平

# 表配置
# 需要生成的表名，多个用逗号分隔
tables=sys_user,sys_role,sys_permission,sys_user_role,sys_role_permission,sys_config,sys_notice,audit_log,org_profile,pet,pet_media,tag,pet_tag,pet_audit,adoption_application,adoption_flow_log,user_favorite,user_behavior,checkin_post,credit_account,credit_log

# 表前缀过滤
table.prefix=sys_,t_

# 输出路径配置
output.dir=src/main/java
xml.output.dir=src/main/resources/mapper

# 生成选项
overwrite=false
enable.lombok=true
enable.chain.model=true
enable.active.record=true
enable.swagger=true

# 命名策略
naming.strategy=underline_to_camel
column.naming.strategy=underline_to_camel

# 字段填充配置
fill.create.time=create_time
fill.update.time=update_time

# 逻辑删除配置
logic.delete.column=deleted
logic.delete.property=deleted

# 主键策略
id.type=AUTO

# 版本控制字段
version.column=version